<!DOCTYPE html>
<html>
<head>

<title>Power Trainer Generator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chess.js@1.0.0-beta.6/dist/chess.js"></script>

</head>

<body>

<div class="container">

<h1>♟ Power Trainer Generator</h1>

<div class="controls">

<input type="file" id="excelFile">

<select id="puzzleType">
<option value="single_variant">Single Variant</option>
<option value="mcq">MCQ</option>
</select>

<select id="chapterSelect"></select>

<button onclick="generateRows()">Create Power Trainer</button>

<button onclick="downloadExcel()">Download Excel</button>

</div>

<table id="resultTable">

<thead>

<tr>

<th>ID</th>
<th>Title</th>
<th>FEN</th>
<th>Puzzle Type</th>
<th>Moves</th>
<th>Chapter</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

<script src="app.js"></script>

</body>
</html>
